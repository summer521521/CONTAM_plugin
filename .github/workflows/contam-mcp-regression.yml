name: CONTAM Plugin Regression

on:
  push:
    paths:
      - ".github/workflows/contam-mcp-regression.yml"
      - ".codex-plugin/**"
      - ".mcp.json"
      - "contam-mcp/**"
      - "skills/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/contam-mcp-regression.yml"
      - ".codex-plugin/**"
      - ".mcp.json"
      - "contam-mcp/**"
      - "skills/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
  workflow_dispatch:

jobs:
  regression:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contam-mcp/package-lock.json

      - name: Install MCP dependencies
        working-directory: contam-mcp
        run: npm ci

      - name: Check repository privacy
        working-directory: contam-mcp
        run: npm run privacy:check

      - name: Check plugin launcher
        run: npm run plugin:check
